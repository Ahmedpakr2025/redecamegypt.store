name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: جلب الكود من المستودع
        uses: actions/checkout@v4

      - name: تجهيز بيئة Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تجهيز بيئة Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: بناء بيئة الأندرويد
        run: |
          mkdir -p www
          cp index.html www/
          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli @capacitor/assets
          npx cap init "elboshy store" "com.elboshy.store" --web-dir www
          npx cap add android

      - name: إضافة أيقونة التطبيق (اللوجو)
        run: |
          mkdir -p assets
          cp icon.png assets/icon.png || true
          npx @capacitor/assets generate --android || true

      - name: الحل الجذري لمشكلة تعارض Kotlin
        run: |
          cat <<EOF >> android/build.gradle
          allprojects {
              configurations.all {
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              }
          }
          EOF

      - name: استخراج ملف الـ APK النهائي
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: رفع التطبيق للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: elboshy-store-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
